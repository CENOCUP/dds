<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA PLATINUM v28.0 - ULTIMATE ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg: #050508;
            --card-glass: rgba(18, 18, 25, 0.95);
            --neon: #00ff87;
            --gold: #ffcc00;
            --silver: #e0e0e0;
            --bronze: #cd7f32;
            --danger: #ff3e3e;
            --blue: #00d4ff;
            --text-main: #ffffff;
            --text-dim: #9494a3;
        }

        body {
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #050508 100%);
            color: var(--text-main); font-family: 'Rajdhani', sans-serif;
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 1300px; }
        
        header { text-align: center; padding: 30px 0; cursor: pointer; }
        header h1 { font-family: 'Orbitron'; font-size: 2.2rem; letter-spacing: 4px; margin: 0; }
        header h1 span { color: var(--neon); text-shadow: 0 0 15px rgba(0,255,135,0.3); }

        /* NAVEGAÇÃO */
        .tabs { display: flex; gap: 5px; justify-content: center; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.03); color: var(--text-dim);
            padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
            cursor: pointer; font-family: 'Orbitron'; font-size: 0.65rem; transition: 0.3s;
        }
        .tab-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); border-color: var(--neon); }

        /* TABELAS DESIGN */
        .table-wrapper { background: var(--card-glass); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th { text-align: center; padding: 12px; color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); font-family: 'Orbitron'; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); text-align: center; }

        /* TRAJETÓRIA CHIP */
        .traj-box { display: flex; flex-direction: column; gap: 4px; font-size: 0.7rem; min-width: 150px; text-align: left; }
        .traj-item { background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; border-left: 2px solid var(--blue); }

        /* DNA BADGE */
        .dna-badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; font-weight: bold; margin-top: 4px; display: inline-block; }
        .dna-rolo { background: var(--danger); color: white; }
        .dna-muralha { background: var(--blue); color: black; }
        .dna-equi { background: var(--neon); color: black; }

        /* HALL DA FAMA CARDS */
        .season-block { background: rgba(255,255,255,0.02); border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .podium-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .p-card { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .p-card img { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid #444; margin-bottom: 8px; }

        /* ADMIN */
        #admin { display: none; background: #0a0a0c; padding: 20px; border-radius: 15px; border: 1px solid var(--neon); margin-bottom: 20px; }
        .edit-row { display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 8px; }
        input { background: #000; border: 1px solid #333; color: #fff; padding: 5px; border-radius: 5px; font-family: 'Rajdhani'; }

    </style>
</head>
<body>

<div class="container">
    <header onclick="openAdmin()">
        <h1>FIFA <span>PLATINUM</span></h1>
        <div style="font-family:'Orbitron'; font-size:0.55rem; color:var(--text-dim); letter-spacing:4px;">ULTIMATE PERFORMANCE DASHBOARD</div>
    </header>

    <div id="admin">
        <div style="display:flex; justify-content: space-between; margin-bottom:15px;">
            <button onclick="exportDB()" style="background:#222; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">💾 BACKUP JSON</button>
            <button onclick="importDB()" style="background:#222; color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">📂 IMPORTAR</button>
        </div>
        <select id="admin-selector" onchange="renderEditor()" style="width:100%; margin-bottom:15px; padding:10px;"></select>
        <div id="editor-container"></div>
        <button onclick="addNewPlayer()" style="width:100%; margin-top:10px; background:transparent; border:1px solid var(--neon); color:var(--neon); padding:10px; cursor:pointer;">+ NOVO JOGADOR</button>
        <button onclick="saveAll()" style="width:100%; margin-top:5px; background:var(--neon); border:none; padding:10px; font-weight:bold; cursor:pointer;">SALVAR TUDO</button>
        <button onclick="closeSeason()" style="width:100%; margin-top:5px; background:var(--danger); color:white; border:none; padding:10px; cursor:pointer;">ENCERRAR TEMPORADA</button>
    </div>

    <div class="tabs">
        <button id="t-tab" class="tab-btn active" onclick="switchTab('tabela')">Temporada</button>
        <button id="r-tab" class="tab-btn" onclick="switchTab('ranking')">Ranking Geral</button>
        <button id="g-tab" class="tab-btn" onclick="switchTab('galeria')">Hall da Fama</button>
        <button id="i-tab" class="tab-btn" onclick="switchTab('insights')">Insights & DNA</button>
    </div>

    <div id="view-tabela">
        <select id="season-selector" onchange="changeView(this.value)" style="width:100%; margin-bottom:15px; padding:12px; background:rgba(255,255,255,0.05); color:white; border-radius:8px; border:1px solid #333;"></select>
        <div class="table-wrapper"><table id="table-main"></table></div>
    </div>

    <div id="view-ranking" style="display:none">
        <div class="table-wrapper"><table id="table-ranking"></table></div>
    </div>

    <div id="view-galeria" style="display:none; flex-direction:column;"></div>

    <div id="view-insights" style="display:none">
        <div id="insights-content" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px;"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'fifa_platinum_v28';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { atual: [], historico: [] };
    let currentMode = 'atual';

    function openAdmin() { if(prompt("Admin:") === '123') document.getElementById('admin').style.display='block'; }

    function switchTab(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        ['view-tabela', 'view-ranking', 'view-galeria', 'view-insights'].forEach(v => document.getElementById(v).style.display = 'none');
        document.getElementById('view-' + mode).style.display = (mode === 'galeria') ? 'flex' : 'block';
        document.getElementById(mode.charAt(0)+'-tab').classList.add('active');
        if(mode === 'tabela') renderTable();
        if(mode === 'ranking') renderRankingGeral();
        if(mode === 'galeria') renderGallery();
        if(mode === 'insights') renderInsights();
    }

    function calcForca(gp, gc) { return parseFloat(((gp * 3.5) - (gc * 2.5)).toFixed(1)); }
    function calcAPR(v, e, d) { let t = (v + e + d) * 3; return t > 0 ? (( (v*3)+e ) / t * 100).toFixed(1) : "0.0"; }

    function renderTable() {
        const sel = document.getElementById('season-selector');
        sel.innerHTML = '<option value="atual">🎮 TEMPORADA ATIVA</option>';
        db.historico.forEach((h, i) => sel.innerHTML += `<option value="${i}">📂 ${h.nome}</option>`);

        let list = currentMode === 'atual' ? [...db.atual] : [...db.historico[currentMode].dados];
        list.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));

        document.getElementById('table-main').innerHTML = `<thead><tr><th>POS</th><th style="text-align:left">TÉCNICO</th><th>J</th><th>PTS</th><th>APR%</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GS</th><th>FORÇA</th></tr></thead>
        <tbody>${list.map((j, i) => `<tr>
            <td style="font-family:'Orbitron'; font-weight:bold;">${i+1}º</td>
            <td style="text-align:left; font-weight:bold;"><img src="${j.foto||''}" style="width:25px; height:25px; border-radius:50%; vertical-align:middle; margin-right:8px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/166/166120.png'">${j.tecnico}</td>
            <td>${j.v+j.e+(j.d||0)}</td><td style="color:var(--neon); font-weight:bold;">${(j.v*3)+j.e}</td><td>${calcAPR(j.v, j.e, j.d||0)}%</td>
            <td>${j.v}</td><td>${j.e}</td><td>${j.d||0}</td><td>${j.gp}</td><td>${j.gc}</td><td style="color:var(--gold)">${calcForca(j.gp, j.gc)}</td>
        </tr>`).join('')}</tbody>`;
    }

    function renderRankingGeral() {
        let stats = {};
        const process = (lista, seasonName) => {
            lista.forEach((j, idx) => {
                if(!stats[j.tecnico]) stats[j.tecnico] = { t:j.tecnico, pts:0, v:0, e:0, d:0, gp:0, gc:0, fTot:0, traj:[], wins:0, lants:0 };
                let s = stats[j.tecnico];
                let forcaS = calcForca(j.gp, j.gc);
                s.pts += (j.v*3)+j.e; s.v += j.v; s.e += j.e; s.d += (j.d||0); s.gp += j.gp; s.gc += j.gc; s.fTot += forcaS;
                s.traj.push({ n: seasonName, p: idx+1, f: forcaS });
                if(idx === 0) s.wins++;
                if(idx === lista.length-1) s.lants++;
            });
        };
        db.historico.forEach(h => process(h.dados, h.nome));
        process(db.atual, "Atual");

        let sorted = Object.values(stats).sort((a,b) => b.pts - a.pts);

        document.getElementById('table-ranking').innerHTML = `<thead><tr><th>RANK</th><th style="text-align:left">TÉCNICO</th><th>TÍTULOS</th><th>JOGOS</th><th>PTS (PPJ)</th><th>GP/GS</th><th>FORÇA TOTAL</th><th style="text-align:left">TRAJETÓRIA (POS/FORÇA)</th></tr></thead>
        <tbody>${sorted.map((j, i) => {
            let totalJ = j.v+j.e+j.d;
            return `<tr>
                <td style="font-family:'Orbitron'; font-size:1.2rem;">${i+1}º</td>
                <td style="text-align:left"><b>${j.t}</b></td>
                <td style="color:var(--gold)">${'🥇'.repeat(j.wins)}${'💩'.repeat(j.lants)}</td>
                <td>${totalJ}</td>
                <td><b>${j.pts}</b> <br><small style="color:var(--text-dim)">${(j.pts/totalJ || 0).toFixed(2)} PPJ</small></td>
                <td><span style="color:var(--neon)">${j.gp}</span> / <span style="color:var(--danger)">${j.gc}</span></td>
                <td style="color:var(--gold); font-weight:bold; font-size:1.1rem;">${j.fTot.toFixed(1)}</td>
                <td style="text-align:left">
                    <div class="traj-box">${j.traj.map(t => `<div class="traj-item"><b>${t.n}:</b> ${t.p}º <span style="color:var(--blue)">(${t.f > 0 ? '+'+t.f : t.f})</span></div>`).join('')}</div>
                </td>
            </tr>`}).join('')}</tbody>`;
    }

    function renderInsights() {
        let stats = {};
        const allData = [...db.historico.flatMap(h => h.dados), ...db.atual];
        allData.forEach(j => {
            if(!stats[j.tecnico]) stats[j.tecnico] = { t:j.tecnico, gp:0, gc:0, j:0, foto: j.foto };
            let s = stats[j.tecnico]; s.gp += j.gp; s.gc += j.gc; s.j += (j.v+j.e+(j.d||0));
        });

        document.getElementById('insights-content').innerHTML = Object.values(stats).map(s => {
            let mGP = (s.gp/s.j || 0).toFixed(2);
            let mGC = (s.gc/s.j || 0).toFixed(2);
            let dnaClass = "dna-equi", dnaLabel = "Estrategista";
            if(mGP > 3.5) { dnaClass = "dna-rolo"; dnaLabel = "Rolo Compressor"; }
            else if(mGC < 1.3) { dnaClass = "dna-muralha"; dnaLabel = "Muralha Defensiva"; }

            return `<div class="table-wrapper" style="text-align:center">
                <img src="${s.foto||''}" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--blue);" onerror="this.src='https://cdn-icons-png.flaticon.com/512/166/166120.png'">
                <h3>${s.t}</h3>
                <div class="dna-badge ${dnaClass}">${dnaLabel}</div>
                <div style="margin-top:15px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;">
                        <small>ATAQUE (MÉD)</small><br><b style="color:var(--neon); font-size:1.2rem;">${mGP}</b>
                    </div>
                    <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:10px;">
                        <small>DEFESA (MÉD)</small><br><b style="color:var(--danger); font-size:1.2rem;">${mGC}</b>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function renderGallery() {
        const gal = document.getElementById('view-galeria');
        if(!db.historico.length) { gal.innerHTML = "<p style='text-align:center'>Histórico vazio.</p>"; return; }
        gal.innerHTML = db.historico.slice().reverse().map(h => `
            <div class="season-block">
                <div style="font-family:'Orbitron'; color:var(--neon); margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:5px;">${h.nome}</div>
                <div class="podium-grid">
                    <div class="p-card" style="border-top:3px solid var(--gold)">
                        <small style="color:var(--gold)">🥇 CAMPEÃO</small><br>
                        <img src="${h.dados[0].foto}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/166/166120.png'"><br><b>${h.dados[0].tecnico}</b>
                    </div>
                    <div class="p-card">
                        <small>🥈 VICE</small><br><b>${h.dados[1]?h.dados[1].tecnico:'-'}</b>
                    </div>
                    <div class="p-card">
                        <small>🥉 3º LUGAR</small><br><b>${h.dados[2]?h.dados[2].tecnico:'-'}</b>
                    </div>
                    <div class="p-card" style="border-top:3px solid var(--danger)">
                        <small style="color:var(--danger)">💩 LANTERNA</small><br>
                        <img src="${h.dados[h.dados.length-1].foto}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/166/166120.png'"><br><b>${h.dados[h.dados.length-1].tecnico}</b>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // ADMIN FUNCS
    function renderEditor() {
        const m = document.getElementById('admin-selector').value;
        const target = m === 'atual' ? db.atual : db.historico[m].dados;
        document.getElementById('editor-container').innerHTML = target.map((j, i) => `
            <div class="edit-row">
                <input style="width:100px" type="text" value="${j.tecnico}" onchange="upd('${m}',${i},'tecnico',this.value)">
                <input style="flex:1" type="text" value="${j.foto||''}" placeholder="Foto URL" onchange="upd('${m}',${i},'foto',this.value)">
                V<input type="number" style="width:40px" value="${j.v}" onchange="upd('${m}',${i},'v',parseInt(this.value))">
                E<input type="number" style="width:40px" value="${j.e}" onchange="upd('${m}',${i},'e',parseInt(this.value))">
                D<input type="number" style="width:40px" value="${j.d||0}" onchange="upd('${m}',${i},'d',parseInt(this.value))">
                GP<input type="number" style="width:40px" value="${j.gp}" onchange="upd('${m}',${i},'gp',parseInt(this.value))">
                GS<input type="number" style="width:40px" value="${j.gc}" onchange="upd('${m}',${i},'gc',parseInt(this.value))">
                <button onclick="db.atual.splice(${i},1);renderEditor()" style="color:red; background:none; border:none; cursor:pointer;">X</button>
            </div>
        `).join('');
    }
    function upd(m, idx, f, v) { if(m==='atual') db.atual[idx][f]=v; else db.historico[m].dados[idx][f]=v; }
    function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); alert("Salvo!"); location.reload(); }
    function addNewPlayer() { db.atual.push({tecnico:"Novo", foto:"", v:0, e:0, d:0, gp:0, gc:0}); renderEditor(); }
    function changeView(v) { currentMode = v; renderTable(); }
    function exportDB() { 
        const a = document.createElement('a'); 
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); 
        a.download = "fifa_platinum_backup.json"; a.click(); 
    }
    function importDB() {
        const inp = document.createElement('input'); inp.type = 'file';
        inp.onchange = e => {
            const r = new FileReader(); r.readAsText(e.target.files[0]);
            r.onload = ev => { db = JSON.parse(ev.target.result); saveAll(); };
        }; inp.click();
    }
    function closeSeason() {
        let n = prompt("Nome da Temporada:");
        if(n && db.atual.length) {
            db.atual.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));
            db.historico.push({ nome: n, dados: JSON.parse(JSON.stringify(db.atual)) });
            db.atual = db.atual.map(j => ({...j, v:0, e:0, d:0, gp:0, gc:0}));
            saveAll();
        }
    }

    const adminSel = document.getElementById('admin-selector');
    adminSel.innerHTML = '<option value="atual">Temporada Atual</option>';
    db.historico.forEach((h, i) => adminSel.innerHTML += `<option value="${i}">${h.nome}</option>`);

    renderTable();
</script>
</body>
</html>
